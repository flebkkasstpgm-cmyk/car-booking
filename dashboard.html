<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAR BOOKING - FREIGHT LINKS EXPRESS (THAILAND) CO., LTD.</title>
    <link rel="icon" type="image/png" sizes="32x32" href="Freight.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
</head>
<body>
    <div class="container animate-fade">
        <header>
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="Freight Links.png" alt="Logo" style="height: 42px; width: auto; transform: translateY(2px); object-fit: contain;">
                <div style="height: 40px; width: 1.5px; background: var(--border); opacity: 0.8;"></div>
                <div style="display: flex; flex-direction: column; justify-content: center;">
                    <div style="font-size: 0.62rem; font-weight: 800; color: var(--primary); letter-spacing: 1.2px; margin-bottom: 0px; opacity: 0.9; line-height: 1;">FREIGHT LINKS EXPRESS (THAILAND) CO., LTD.</div>
                    <h1 style="font-size: 1.5rem; letter-spacing: -0.5px; margin: 0; padding: 2px 0 0; border: none; line-height: 1.1; font-weight: 900;">CAR BOOKING</h1>
                    <p id="welcome-text" style="font-size: 0.82rem; font-weight: 600; color: var(--text-sub); margin: 2px 0 0; line-height: 1;">Connecting...</p>
                </div>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <button id="admin-export-btn" onclick="exportData(this)" class="btn-export" style="display: none; height: 40px; font-size: 0.85rem;">
                    <span>Export Report (.txt)</span>
                    <span class="btn-spinner"></span>
                </button>
                <button onclick="openChangePasswordModal(this)" class="btn-logout" style="height: 40px; font-size: 0.85rem; border-color: var(--primary) !important; color: var(--primary) !important;">
                    <span>Change Password</span>
                    <span class="btn-spinner"></span>
                </button>
                <button onclick="logout(this)" class="btn-logout" style="height: 40px; font-size: 0.85rem;">
                    <span>Logout</span>
                    <span class="btn-spinner"></span>
                </button>
            </div>
        </header>

        <div style="padding: 0 0 20px; margin-top: -10px;">
            <p id="role-text" style="font-size: 0.75rem; opacity: 0.6; font-weight: 500;"></p>
        </div>

        <!-- Change Password Modal -->
        <div id="password-modal" class="loading-overlay" style="z-index: 10001; display: none;">
            <div class="card" style="max-width: 380px; padding: 40px 30px; animation: zoomIn 0.25s; border-radius: 16px; text-align: center;">
                <h2 style="color: var(--primary); margin-bottom: 25px; font-weight: 800; font-size: 1.3rem;">Update Password</h2>
                <div class="form-group" style="padding: 0; margin-bottom: 15px;">
                    <label>New Password</label>
                    <input type="password" id="new-password" placeholder="Min 4 characters" required>
                </div>
                <div class="form-group" style="padding: 0; margin-bottom: 30px;">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirm-password" placeholder="Repeat new password" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="processChangePassword(this)" style="flex: 2;">
                        <span>Save Password</span>
                        <span class="btn-spinner"></span>
                    </button>
                    <button onclick="closeChangePasswordModal(this)" style="flex: 1; background: #F1F2F4; color: var(--text-main);">
                        <span>Cancel</span>
                        <span class="btn-spinner"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Booking Form Section -->
        <div id="user-section" style="display: none;">
            <div class="card" style="border-top: 4px solid var(--primary);">
                <h3 onclick="toggleBookingForm()" style="cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #FCFDFF;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span>Create New Booking</span>
                    </div>
                    <span id="fold-icon" style="font-size: 0.8rem; opacity: 0.5;">▼</span>
                </h3>
                
                <div id="booking-form-content" style="display: none; padding: 0 0 30px; animation: slideIn 0.35s ease-out;">
                    <div class="filters" style="background: transparent; border-bottom: none;">
                        <div class="form-group" style="padding: 0;">
                            <label class="required">Vehicle Type</label>
                            <select id="car_type">
                                <option value="" selected disabled>Select Vehicle</option>
                                <option value="BYD">BYD (Electric)</option>
                                <option value="VIOS">VIOS (Sedan)</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1.5; padding: 0;">
                            <label class="required">Select Date(s)</label>
                            <input type="text" id="date" placeholder="Click to choose dates">
                        </div>
                    </div>

                    <div id="booking-days-container">
                        <!-- Dynamic Day Rows will be injected here -->
                    </div>
                    
                    <div class="filters" style="margin-top: 10px; background: transparent; border-bottom: none; border-top: 1.5px dashed var(--border); padding-top: 30px;">
                        <div class="form-group" style="padding: 0; flex: 2;">
                            <label class="required" id="pickup-label">Destination / Location</label>
                            <input type="text" id="pickup" placeholder="e.g. Suvarnabhumi Airport" style="flex: 1;" onkeypress="if(event.key === 'Enter') addBooking(document.getElementById('book-btn'))">
                        </div>
                        <div class="form-group" id="booked-by-group" style="padding: 0; flex: 1;">
                            <label class="required" id="note-label">Booked By (Staff Name)</label>
                            <input type="text" id="note" onkeypress="if(event.key === 'Enter') addBooking(document.getElementById('book-btn'))">
                        </div>
                    </div>
                    
                    <div style="margin-top: 10px; display: flex; justify-content: flex-end; padding: 0 25px;">
                        <button id="book-btn" onclick="addBooking(this)" style="width: auto; min-width: 220px; background: var(--accent);">
                            <span>Confirm All Bookings</span>
                            <span class="btn-spinner"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard Data Section -->
        <div class="card animate-fade" style="animation-delay: 0.1s;">
            <h3 style="background: #FCFDFF;">
                <span>Vehicle Schedule Monitor</span>
            </h3>
            
            <div class="filters">
                <div class="form-group">
                    <label>Filter by Date</label>
                    <input type="text" id="filter-date" placeholder="Select date">
                </div>
                <div class="form-group">
                    <label>Vehicle Type</label>
                    <select id="filter-car" onchange="renderBookings()">
                        <option value="">Show All Vehicles</option>
                        <option value="BYD">BYD</option>
                        <option value="VIOS">VIOS</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 180px;">Vehicle</th>
                            <th style="width: 160px;">Date / Time</th>
                            <th>Destination</th>
                            <th style="width: 150px;">Staff</th>
                            <th style="width: 140px;">Status</th>
                            <th style="width: 130px; text-align: center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="booking-list">
                        <!-- Data injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 40px; opacity: 0.4; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px;">
            FREIGHT LINKS EXPRESS THAILAND | INTERNAL LOGISTICS SYSTEM
        </div>
    </div>

    <!-- Admin Edit Modal -->
    <div id="edit-modal" class="loading-overlay" style="z-index: 10000; display: none;">
        <div class="card" style="max-width: 550px; animation: zoomIn 0.25s; border-radius: 16px;">
            <h3 id="edit-modal-title" style="background: var(--primary-light); color: var(--primary); border: none;">Edit Booking Record</h3>
            <div style="padding: 25px 0;">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Date</label>
                    <input type="text" id="edit-date">
                </div>
                <div class="filters" style="background: transparent; border: none; padding: 0 25px 20px;">
                    <div class="form-group" style="padding: 0;">
                        <label>Vehicle</label>
                        <select id="edit-car-type" onchange="updateEditModalLabels()">
                            <option value="BYD">BYD</option>
                            <option value="VIOS">VIOS</option>
                        </select>
                    </div>
                    <div class="form-group" style="padding: 0;">
                        <label>Status</label>
                        <select id="edit-status">
                            <option value="pending">Pending</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Time Slot</label>
                    <select id="edit-time-slot" onchange="toggleEditCustomTime()">
                        <option value="เช้า">Morning (08:30-12:00)</option>
                        <option value="บ่าย">Afternoon (13:00-17:00)</option>
                        <option value="ทั้งวัน">All Day</option>
                        <option value="กำหนดเวลาเอง">Custom Range (Specify Time)</option>
                    </select>
                </div>
                <div id="edit-custom-time-row" style="display: none; padding: 0 25px 20px;">
                    <div style="display: flex; gap: 12px; align-items: center; background: #F8FAFB; padding: 15px; border-radius: 8px; border: 1px solid var(--border);">
                        <div style="flex: 1;">
                            <label style="font-size: 0.7rem; opacity: 0.6;">Start Time</label>
                            <input type="text" id="edit-start-time">
                        </div>
                        <div style="color: var(--text-sub); margin-top: 15px;">to</div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.7rem; opacity: 0.6;">End Time</label>
                            <input type="text" id="edit-end-time">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label id="edit-pickup-label">Destination</label>
                    <input type="text" id="edit-pickup">
                </div>
                <div class="form-group">
                    <label id="edit-dropoff-label">Service Option</label>
                    <select id="edit-dropoff">
                        <!-- Options will be populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Booked By</label>
                    <input type="text" id="edit-booked-by">
                </div>

                <div id="edit-image-section" style="margin: 0 25px 20px; padding: 20px; background: #F8F9FA; border-radius: 12px; border: 1.5px dashed var(--border); display: none;">
                    <label style="margin-bottom: 12px; text-align: center;">Evidence Attachment</label>
                    <div style="text-align: center;">
                        <img id="edit-img-preview" src="" style="max-width: 100%; border-radius: 8px; box-shadow: var(--shadow-sm);">
                        <button onclick="clearImageInModal(this)" style="background: transparent; border: 1.5px solid var(--accent); color: var(--accent); margin-top: 15px; width: auto; padding: 8px 20px; font-size: 0.8rem; margin-inline: auto;">
                            <span>Remove Image</span>
                            <span class="btn-spinner"></span>
                        </button>
                        <input type="hidden" id="edit-image-action" value="keep">
                    </div>
                </div>

                <div style="display: flex; gap: 12px; padding: 0 25px; margin-top: 10px;">
                    <button onclick="saveAdminEdit(this)" style="flex: 2;">
                        <span>Save Changes</span>
                        <span class="btn-spinner"></span>
                    </button>
                    <button onclick="closeEditModal(this)" style="flex: 1; background: #F1F2F4; color: var(--text-main);">
                        <span>Cancel</span>
                        <span class="btn-spinner"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script src="script.js"></script>
</body>
</html>
