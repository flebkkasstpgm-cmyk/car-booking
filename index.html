<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAR BOOKING - FREIGHT LINKS EXPRESS (THAILAND) CO., LTD.</title>
    <link rel="icon" type="image/png" sizes="32x32" href="Freight.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card animate-fade">
            <div class="login-header" style="text-align: center; margin-bottom: 35px;">
                <img src="Freight Links.png" alt="Company Logo" style="height: 100px; width: auto; margin-bottom: 8px; object-fit: contain;">
                <div style="font-size: 0.8rem; font-weight: 800; color: var(--primary); letter-spacing: 1px; margin-bottom: 20px; opacity: 0.9; white-space: nowrap;">FREIGHT LINKS EXPRESS (THAILAND) CO., LTD.</div>
                <h1 style="font-size: 2.2rem; letter-spacing: -1.2px; font-weight: 900; margin: 0; border: none; padding: 0; line-height: 1;">CAR BOOKING</h1>
                <p style="color: var(--text-sub); font-size: 0.95rem; margin-top: 10px; font-weight: 500;">Fleet Management Intelligence</p>
            </div>
            
            <div class="form-group" style="padding: 0;">
                <label>Username</label>
                <input type="text" id="username" placeholder="Please enter your username" required autofocus onkeypress="if(event.key === 'Enter') handleLogin()">
            </div>
            
            <div class="form-group" style="padding: 0; margin-top: 15px;">
                <label>Password</label>
                <input type="password" id="password" placeholder="Please enter your password" required onkeypress="if(event.key === 'Enter') handleLogin()">
            </div>
            
            <button id="login-btn" onclick="handleLogin()" style="margin: 30px 0 0; width: 100%;">
                <span id="btn-text">Sign In</span>
                <div id="btn-spinner" style="display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
            </button>
            
            <div style="margin-top: 40px; font-size: 0.7rem; color: var(--text-sub); font-weight: 500; text-align: center;">
                © 2026 FREIGHT LINKS EXPRESS THAILAND.
            </div>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="error-modal" class="loading-overlay" style="z-index: 10001; display: none;">
        <div class="card" style="max-width: 340px; text-align: center; padding: 40px 30px; animation: zoomIn 0.25s; border-radius: 16px;">
            <div style="font-size: 2.5rem; margin-bottom: 15px;">⚠️</div>
            <h2 style="color: var(--primary); margin-bottom: 10px; font-weight: 800; font-size: 1.4rem;">Access Denied</h2>
            <p id="modal-error-msg" style="color: var(--text-main); margin-bottom: 25px; font-weight: 500; font-size: 0.95rem;">Authentication failed. Please try again.</p>
            <button onclick="closeErrorModal()" style="width: 100%; border-radius: 8px;">Try Again</button>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script src="script.js"></script>
</body>
</html>
